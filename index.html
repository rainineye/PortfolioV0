<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio &middot; UX &amp; Product Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Serif:wght@400&family=PT+Serif+Caption:ital@1&family=Public+Sans:ital,wght@0,100;0,200;0,400;0,500;0,600;1,400&family=Roboto+Condensed:wght@400&family=Roboto+Flex:opsz,wght@8..144,400..700&family=Tomorrow:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="image" href="assets/optimized/project-card-thumb.png" />
    <link rel="preload" as="image" href="assets/optimized/01-savvy-defi-1.png" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <div class="portfolio-site">
      <div class="hero-section">
        <div class="hero-inner">
          <div class="hero-content">
            <div class="hero-top">
              <nav class="nav-row">
                <div class="nav-hello">
                  <p class="hello-text">
                    Hi! It's <span class="name">Mian</span>,
                    <span class="role">Product</span><span class="slash"> / </span
                    ><span class="role">UX Lead</span>
                  </p>
                </div>
                <div class="tabs-row">
                  <div class="tabs" aria-label="Primary sections">
                    <button
                      type="button"
                      class="tab active"
                      data-tab="projects"
                      aria-pressed="true"
                    >
                      Projects
                    </button>
                    <span class="tab-sep" aria-hidden="true">,</span>
                    <button
                      type="button"
                      class="tab"
                      data-tab="thoughts"
                      aria-pressed="false"
                    >
                      Thoughts
                    </button>
                    <span class="tab-sep" aria-hidden="true">,</span>
                    <button
                      type="button"
                      class="tab"
                      data-tab="visuals"
                      aria-pressed="false"
                    >
                      Visuals
                    </button>
                  </div>
                  <div class="contact-fullscreen">
                    <a href="mailto:rainineyeweb3@gmail.com" class="contact-link">Contact</a>
                    <button
                      type="button"
                      class="fullscreen-btn"
                      id="fullscreenBtn"
                      aria-label="Enter fullscreen"
                    >
                      <img
                        src="assets/icons/fullscreen--no--normal.svg"
                        alt=""
                        class="fullscreen-btn__icon"
                        width="24"
                        height="24"
                        aria-hidden="true"
                      />
                    </button>
                  </div>
                </div>
              </nav>
              <div class="hero-msg-section">
                <div class="hero-msg-left"></div>
                <div class="hero-msg-right">
                  <div class="hero-message">
                    <span class="curious">Curious soul</span>
                    <span class="over">over</span>
                    <span class="complexity">complexity</span><span>,</span>
                    <span class="distilling">distilling it into</span>
                    <span class="simplicity">simplicity</span>
                    <span class="and">and</span>
                    <span class="elegance">elegance</span><span>.</span>
                  </div>
                  <div class="hero-color-area"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="project-list-section">
            <div class="project-list-wrapper">
              <div class="project-list" id="projectList"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="chronological-bleed">
        <div class="chronological-title">
          <div class="chronological-text">
            <div class="chronological-line"></div>
            <span>In Chronological Order 2022 - 2025</span>
            <div class="chronological-line"></div>
          </div>
        </div>
        <div class="projects-chronological" id="projectsChronological"></div>
        <footer class="footer" id="contact">
          <div class="footer-inner">
            <span class="footer-text"
              >Vibe coded w/ Figma MCP, Claude Code &amp; Cursor, All Rights Reserved</span
            >
            <span class="footer-copy">&copy;</span>
          </div>
        </footer>
      </div>
    </div>

    <div class="overlay" id="trillionOverlay" aria-hidden="true">
      <div class="overlay-frame">
        <iframe
          id="trillionFrame"
          src="about:blank"
          title="Trillion DeFi"
        ></iframe>
      </div>
    </div>

    <script src="js/projects-data.js"></script>
    <script src="js/project-renderer.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
